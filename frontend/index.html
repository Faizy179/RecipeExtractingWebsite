<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frictionless Recipe Extractor</title>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; background-color:#ffffff;}
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #6c757d; }
        #loading { display: none; color: #555; font-style: italic; }
        #recipe-display { margin-top: 20px; }
        ul, ol { padding-left: 20px; }
        li { margin-bottom: 8px; }
        .completed-step{
            text-decoration: line-through;
            color: #999;
            transition: 0.3s;
        }
        .instruction-item{
            cursor: pointer;
        }
    </style>
</head>
<body onkeypress="enterRecipe(event)">
<center>
<h1 style="color: #6f4827;">

    Declutter Any Recipe
</h1>
<div class = "search-container">
    <input type = "text"  id = "url-input"  placeholder="https://myFavoriteRecipe.com/amazingRecipe" onkeypress="enterRecipe(event)">
    <button  id = "extractButton" onclick = "fetchRecipe()" > 
        Extract!
    </button>
</div>
</center>
<div id = "loading" style = "display:none">
    Loading recipe.... please wait
</div>
<div id = "recipe-display" >
    
</div>
<div style = "margin-bottom: 20px;"> 
    <input type = "checkbox" id = "wake" onchange = "toggleWakeLock()">
    <label for = "wake" style = "color : rgb(31, 68, 93)"> Keep screen Awake (Don't let my phone sleep!)</label>

</div>
</body>
<script>
    let wake = null;
    async function enterRecipe(event){
        if(event.key == 'Enter'){
            fetchRecipe();
        }
    }
    async function toggleWakeLock() {
        const checkbox = document.getElementById("wake");
        if(checkbox.checked){
            try{
                wake = await navigator.wakeLock.request('screen');
            }
            catch(err){
                alert("Locking your screen is not supported by your current browser");
                checkbox.checked  = false;
            }
        }
        else{
            if(wake !== null){
                wake.release();
                wake = null;
            }
        }
    }
    async function fetchRecipe(){
        const userInput = document.getElementById("url-input").value.trim();
        const loadingDiv = document.getElementById("loading");
        const displayDiv = document.getElementById("recipe-display");
        const button = document.getElementById("extractButton");
        if(!userInput){
            alert("Please paste a valid url");
        }
        else if(!userInput.startsWith("https")){
            alert("Please ensure url begins with http");
        }
        else{
            loadingDiv.style.display = "block";
            displayDiv.innerHTML = "";
            button.disabled = true;
            try{
                const response = await fetch (`https://admin1.hackclub.app/api/extract?url=${encodeURIComponent(userInput)}`);
                const data = await response.json();
               displayDiv.style.display = "block"; 
               if(data.error){
                    displayDiv.innerHTML = `<p style = "color: red;"> Fatal Error: ${data.error}</p>`;
                }
                else{
                    const instructionsHtml = (data.instructions || []).map(step => `<li class="instruction-item" onclick="this.classList.toggle('completed-step')">${step}</li>`).join('');
                    const ingredientsHtml = (data.ingredients || []).map(ing => `<li>${ing}</li>`).join('');
                    displayDiv.innerHTML = ` 
                        <h2 style = "color: #6f4827">${data.name}</h2>
                        <h3>Ingredients</h3>
                        <ul>
                            ${ingredientsHtml}
                        </ul>
                        <h3>Instructions</h3>
                        <ol>
                            ${instructionsHtml}
                        </ol> 
                        <p style = "color:#28a745;">
                            Click on Instruction to mark as finished
                        </p>
                    `;
                }
            }
            catch(error){
                displayDiv.style.display = "block";
                displayDiv.innerHTML = `<p style = "color: red;"> Fatal Error ${error}</p>`;
                console.log("Error while fetching recipe:", error);
            }
            finally{
                loadingDiv.style.display = "none"
                button.disabled = false;
            }
        }
    }
</script>
</html>
